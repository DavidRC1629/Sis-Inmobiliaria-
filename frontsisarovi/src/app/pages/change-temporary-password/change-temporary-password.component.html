<div class="reset-page">
  <div class="reset-card">
    <div class="reset-header">
      <button type="button" class="btn-back" routerLink="/login">← Login</button>
      <h2>Cambiar Contraseña</h2>
      <span class="spacer"></span>
    </div>

    <p class="note">
      <span *ngIf="!forceChange">
        Ingrese su correo registrado, el código temporal recibido por correo (válido por 10 minutos) y su nueva contraseña.
      </span>
      <span *ngIf="forceChange">
        Iniciaste sesión con código temporal. Debes cambiar y confirmar tu nueva contraseña para continuar.
      </span>
    </p>

    <div class="form-group" *ngIf="!forceChange">
      <label for="email">Correo</label>
      <input id="email" type="email" [(ngModel)]="email" placeholder="correo@ejemplo.com" />
    </div>

    <div class="form-group" *ngIf="!forceChange">
      <label for="temporaryCode">Código Temporal</label>
      <input id="temporaryCode" type="text" [(ngModel)]="temporaryCode" placeholder="Código recibido por correo" />
    </div>

    <div class="form-group">
      <label for="newPassword">Nueva Contraseña</label>
      <div class="password-input-modern">
        <input
          [type]="showNewPassword ? 'text' : 'password'"
          id="newPassword"
          [(ngModel)]="newPassword"
          placeholder="••••••••"
        />
        <button type="button" class="toggle-password-modern" (click)="toggleNewPassword()" tabindex="-1">👁</button>
      </div>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirmar Contraseña</label>
      <div class="password-input-modern">
        <input
          [type]="showConfirmPassword ? 'text' : 'password'"
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          placeholder="••••••••"
        />
        <button type="button" class="toggle-password-modern" (click)="toggleConfirmPassword()" tabindex="-1">👁</button>
      </div>
    </div>

    <div class="error-message" *ngIf="formError">{{ formError }}</div>
    <div class="success-message" *ngIf="successMessage">{{ successMessage }}</div>

    <button type="button" class="btn-save" (click)="submitChange()">Guardar Nueva Contraseña</button>
  </div>
</div>
