<div class="forgot-page">
  <div class="forgot-card">
    <div class="forgot-header">
      <button type="button" class="btn-back" routerLink="/login">← Login</button>
      <button type="button" class="btn-close" routerLink="/login">✕</button>
    </div>

    <h2>¿OLVIDÓ SU CONTRASEÑA?</h2>

    <p class="description">
      Ingrese su correo electrónico registrado para continuar.
    </p>

    <p class="description emphasis">
      Enviar correo de recuperación en el cuál se generará un código temporal el cuál durará 10 minutos.
      Ese código será la contraseña temporal para iniciar sesión con su DNI.
    </p>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        [(ngModel)]="email"
        placeholder="correo@ejemplo.com"
      />
    </div>

    <button
      type="button"
      class="btn-send"
      [disabled]="!email || loading"
      (click)="sendRecoveryMail()"
    >
      <span *ngIf="!loading">ENVIAR CORREO DE RECUPERACIÓN</span>
      <span *ngIf="loading">VALIDANDO CORREO...</span>
    </button>

    <div class="error-box" *ngIf="errorMessage">{{ errorMessage }}</div>

    <div class="success-box" *ngIf="submitted">
      {{ successMessage }}
    </div>

    <button
      *ngIf="submitted"
      type="button"
      class="btn-next"
      (click)="goToResetView()"
    >
      Continuar
    </button>
  </div>
</div>
