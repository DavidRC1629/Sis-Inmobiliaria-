# ===========================================
# Configuración PRODUCCIÓN (servidor cliente)
# ===========================================
server.port=8080
spring.application.name=inmobiliario-backend

# MySQL Database Configuration - PRODUCCIÓN
# "mysql" es el nombre del servicio en tu docker-compose.yml
# "sisarovi_dbb" es el nombre de la base de datos en tu docker-compose.yml
spring.datasource.url=jdbc:mysql://mysql:3306/sisarovi_dbb?createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=admin

# JPA Configuration - PRODUCCIÓN
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Multipart limits for proforma PDF uploads
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# JWT Configuration - PRODUCCIÓN
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expiration=86400000

# Security
server.error.include-message=never
server.error.include-stacktrace=never

# Resend email configuration - PRODUCCIÓN
resend.enabled=true
resend.api.key=${RESEND_API_KEY:}
resend.from.email=${RESEND_FROM_EMAIL:onboarding@resend.dev}