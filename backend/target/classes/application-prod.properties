# ===========================================
# Configuración PRODUCCIÓN (servidor cliente)
# ===========================================
# Server Configuration
server.port=8080
spring.application.name=inmobiliario-backend

# MySQL Database Configuration - PRODUCCIÓN
# ⚠️ CAMBIAR ESTOS VALORES AL DESPLEGAR:
spring.datasource.url=jdbc:mysql://SERVIDOR_CLIENTE:3306/sisarovi_db
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=sisarovi_user
spring.datasource.password=CAMBIAR_ESTA_CONTRASEÑA
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# JPA Configuration - PRODUCCIÓN
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration - PRODUCCIÓN
# ⚠️ CAMBIAR ESTE SECRET EN PRODUCCIÓN:
jwt.secret=CAMBIAR_POR_CLAVE_SEGURA_EN_PRODUCCION_MIN_256_BITS
jwt.expiration=86400000

# Security
server.error.include-message=never
server.error.include-stacktrace=never
