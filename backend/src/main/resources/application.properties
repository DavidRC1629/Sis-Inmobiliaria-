# Server Configuration
server.port=8080
spring.application.name=inmobiliario-backend

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/sisarovi_db
spring.datasource.driverClassName=org.postgresql.Driver
