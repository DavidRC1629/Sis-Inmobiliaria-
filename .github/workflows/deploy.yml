name: CD Pipeline - Despliegue en AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Desplegar en Amazon EC2
    runs-on: ubuntu-latest

    steps:
      - name: Conectarse al EC2 por SSH y actualizar contenedores
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "--- Iniciando despliegue ---"
            cd /home/ec2-user/Sis-Inmobiliaria-
            
            # 1. Traer los cambios
            git pull origin main
            
            # 2. Reconstruir y levantar contenedores
            docker compose up -d --build --force-recreate
            
            # 3. Limpiar imágenes huérfanas
            docker image prune -f
            
            echo "--- Despliegue finalizado con éxito ---"
