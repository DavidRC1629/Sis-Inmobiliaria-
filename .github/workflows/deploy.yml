name: CD Pipeline - Despliegue en AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Desplegar en Amazon EC2
    runs-on: ubuntu-latest

    steps:
      - name: Conectarse al EC2 por SSH y actualizar contenedores
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "--- Iniciando actualización ---"
            cd /home/ec2-user/Sis-Inmobiliaria-
            
            # 1. Traer el código nuevo
            git pull origin main
            
            # 2. Entrar a la carpeta del frontend y compilar
            # (Ajusta 'frontsisarovi' si tu carpeta se llama diferente)
            cd frontsisarovi
            npm install
            npm run build
            
            # 3. Volver a la raíz y levantar el contenedor
            cd ..
            docker compose up -d --build --force-recreate
            
            echo "--- Despliegue finalizado ---"
