name: CD Pipeline - Despliegue en AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Desplegar en Amazon EC2
    runs-on: ubuntu-latest

    steps:
      - name: Conectarse al EC2 por SSH y actualizar contenedores
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Conexión exitosa al servidor AWS EC2"
            
            # 1. Entrar a la carpeta del proyecto
            cd /home/ec2-user/Sis-Inmobiliaria-
            
            # 2. Descargar los últimos cambios
            echo "Descargando actualizaciones desde GitHub..."
            git pull origin main
            
            # 3. Reconstruir y levantar contenedores
            # --build: Fuerza la reconstrucción de la imagen si cambió el Dockerfile
            # --force-recreate: Reemplaza el contenedor viejo aunque no haya cambiado la configuración
            echo "Reconstruyendo e iniciando contenedores..."
            docker-compose up -d --build --force-recreate
            
            # 4. Limpieza: Borrar imágenes huérfanas (dangling images) para ahorrar espacio
            echo "Limpiando imágenes antiguas..."
            docker image prune -f
            
            echo "¡Despliegue finalizado con éxito en AWS!"
