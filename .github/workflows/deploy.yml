name: CD Pipeline - Despliegue en AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Desplegar en Amazon EC2
    runs-on: ubuntu-latest

    steps:
      - name: Conectarse al EC2 por SSH y actualizar contenedores
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "--- Iniciando despliegue forzado ---"
            cd /home/ec2-user/Sis-Inmobiliaria-
            
            # 1. Traer cambios
            git pull origin main
            
            # 2. Forzar la reconstrucción total de las imágenes
            # --no-cache: Obliga a Docker a ignorar lo viejo y bajar todo desde cero
            # --pull: Asegura que si hay una imagen nueva en el registro, la use
            echo "Reconstruyendo contenedores desde cero..."
            docker-compose build --no-cache
            
            # 3. Reemplazar contenedores antiguos
            echo "Reemplazando contenedores..."
            docker-compose up -d --force-recreate
            
            # 4. Eliminar imágenes antiguas "huérfanas"
            docker image prune -f
            
            echo "--- Despliegue completado con éxito ---"
