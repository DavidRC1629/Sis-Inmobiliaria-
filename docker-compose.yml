version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: sisarovi-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sisarovi_dbb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile-backend
    container_name: sisarovi-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/sisarovi_dbb?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pipeline-net

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile-frontend
    container_name: sisarovi-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - pipeline-net

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"
    networks:
      - pipeline-net

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    ports:
      - "9080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - pipeline-net
    user: root

networks:
  pipeline-net:
    driver: bridge

volumes:
  mysql_data:
  jenkins_home:
