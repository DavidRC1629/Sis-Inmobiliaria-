version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: sisarovi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sisarovi_dbb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sisarovi-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sisarovi_dbb?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontsisarovi
      dockerfile: Dockerfile
    container_name: sisarovi-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mysql_data:
